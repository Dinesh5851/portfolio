<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            padding: 0;
            box-sizing: border-box;
            margin: 0;
        }
        #cal1{
            height: 200px;
            width: 300px;
            border: 2px solid black;
            color: rgb(89, 65, 185);
            background-color: aqua;
            border-radius: 5px;
            align-items: center;
            padding: 10px;
            margin-left: 200px;
            margin-top: 100px;

        }
        button{
            color: white;
            background-color: rgb(109, 58, 218);
            width: 50px;
            border-radius: 3px;
        }
        h1{
            color: red;
        }
        input{
            width: 50px;
        }
        
    </style>
</head>
<body>
    <div id="cal1">
    <label for="">Enter first Numer :</label>
    <input type="number" id="number1"><br><br>

    <label for="">Enter Second Numer :</label>
    <input type="number" id="number2"><br><br>

    <button onclick="Addiction()">ADD</button>
    <button onclick="Subtraction()">SUB</button>
    <button onclick="Multiplication()">MUL</button>
    <button onclick="Division()">DIV</button><br><br>

    <label for="">Final Result :</label>
    <h1 id="output"></h1>
    </div>

    <script>
        function Addiction(){
            var num1=document.getElementById("number1").value
            var num2=document.getElementById("number2").value
            var add=parseInt(num1)+parseInt(num2)
            console.log(add)
            document.getElementById("output").innerHTML=add
        }
        function Subtraction(){
            var num1=document.getElementById("number1").value
            var num2=document.getElementById("number2").value
            var sub=parseInt(num1)-parseInt(num2)
            console.log(sub)
            document.getElementById("output").innerHTML=sub
        }
         function Multiplication(){
            var num1=document.getElementById("number1").value
            var num2=document.getElementById("number2").value
            var mul=parseInt(num1)*parseInt(num2)
            console.log(mul)
            document.getElementById("output").innerHTML=mul
        }
         function Division(){
            var num1=document.getElementById("number1").value
            var num2=document.getElementById("number2").value
            var div=parseInt(num1)/parseInt(num2)
            console.log(div)
            document.getElementById("output").innerHTML=div
        }
        

    </script>
</body>
</html>
